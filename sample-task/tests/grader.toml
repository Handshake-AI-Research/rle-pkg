model = "anthropic/claude-sonnet-4-5-20250929"
sandbox_user = "sandbox"
instructions = """
# System instructions

You have the following binaries pre-installed:
- python3

You have the following Python libraries pre-installed:
- numpy

# Task

1. Call the magic() MCP tool to get the magic word.
2. Let "x" be the number of characters in the magic word.
3. Compute round(sinc(x)), and write the result as an integer to the file "foo.txt".
4. Call the poke() tool.
"""
rubric_path = "/tests/rubric.json"
workdir = "/home/agent/workspace"
trajectory_path = "/logs/agent/trajectory.json"
output_dir = "/logs/verifier"

[[mcp_servers]]
name = "magic-server"
transport = "stdio"
command = "/usr/bin/mcp-server"
